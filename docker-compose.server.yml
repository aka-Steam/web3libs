services:
  anvil:
    image: ${ANVIL_IMAGE:-ghcr.io/foundry-rs/foundry:latest}
    container_name: web3-stand-anvil
    environment:
      ANVIL_IP_ADDR: 0.0.0.0
    command: ["anvil", "--port", "8545"]
    restart: unless-stopped

  app:
    image: ${APP_IMAGE:-ghcr.io/replace-me/playground-v2-app:latest}
    container_name: web3-stand-app
    depends_on:
      - anvil
    ports:
      - "80:80"
    restart: unless-stopped
